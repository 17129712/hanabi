<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>湖上花火大会 — リアル花火シミュレーター</title>
<meta name="description" content="スマホで楽しめるリアルな花火シミュレーター。大スターマイン・菊・牡丹・枝垂柳など好きな花火を打ち上げよう。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#e9ecf5;
    --ink-dim:#8b93ab;
    --night:#04060f;
    --lantern:#ffb45c;
    --glass:rgba(10,14,28,.62);
    --line:rgba(233,236,245,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--night)}
  body{
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
    color:var(--ink);
    touch-action:manipulation;
    user-select:none;-webkit-user-select:none;
  }
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
  #bg{z-index:0}#re{z-index:1}#fx{z-index:2}

  /* ---------- 上部タイトル ---------- */
  header{
    position:fixed;z-index:10;top:0;left:0;right:0;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;
    display:flex;align-items:flex-start;justify-content:space-between;
    pointer-events:none;
    background:linear-gradient(to bottom,rgba(4,6,15,.75),transparent);
  }
  .title{pointer-events:none}
  .title h1{
    font-family:"Shippori Mincho",serif;font-weight:700;
    font-size:clamp(19px,4.6vw,26px);letter-spacing:.32em;
    text-shadow:0 0 18px rgba(255,180,92,.35);
  }
  .title p{
    font-size:11px;letter-spacing:.18em;color:var(--ink-dim);margin-top:4px;
  }
  .switches{display:flex;gap:8px;pointer-events:auto}
  .sw{
    font-family:inherit;font-size:11.5px;letter-spacing:.06em;color:var(--ink-dim);
    background:var(--glass);border:1px solid var(--line);border-radius:999px;
    padding:8px 13px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    cursor:pointer;transition:color .2s,border-color .2s,box-shadow .2s;
  }
  .sw.on{
    color:var(--lantern);border-color:rgba(255,180,92,.55);
    box-shadow:0 0 14px rgba(255,180,92,.25) inset,0 0 10px rgba(255,180,92,.15);
  }
  .sw:focus-visible{outline:2px solid var(--lantern);outline-offset:2px}

  /* ---------- 中央のヒント ---------- */
  #hint{
    position:fixed;z-index:9;left:50%;top:42%;transform:translate(-50%,-50%);
    text-align:center;pointer-events:none;transition:opacity 1s;
  }
  #hint .ring{
    width:58px;height:58px;margin:0 auto 14px;border-radius:50%;
    border:1px solid rgba(233,236,245,.4);
    animation:pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{
    0%{transform:scale(.6);opacity:.9}
    70%{transform:scale(1.25);opacity:0}
    100%{transform:scale(1.25);opacity:0}
  }
  #hint p{font-size:13px;letter-spacing:.28em;color:var(--ink-dim)}
  #hint.hide{opacity:0}

  /* ---------- 玉名表示(打ち上げアナウンス) ---------- */
  #tamana{
    position:fixed;z-index:9;left:50%;bottom:calc(env(safe-area-inset-bottom) + 132px);
    transform:translateX(-50%);
    font-family:"Shippori Mincho",serif;font-size:15px;letter-spacing:.4em;
    color:rgba(233,236,245,.92);text-shadow:0 0 12px rgba(255,180,92,.4);
    opacity:0;transition:opacity .5s;pointer-events:none;white-space:nowrap;
    padding-left:.4em;
  }
  #tamana.show{opacity:1}

  /* ---------- 花火選択(番付) ---------- */
  nav{
    position:fixed;z-index:10;left:0;right:0;bottom:0;
    padding:12px 14px calc(env(safe-area-inset-bottom) + 14px);
    background:linear-gradient(to top,rgba(4,6,15,.88) 40%,transparent);
  }
  .rail{
    display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;
    padding:4px 2px;scroll-snap-type:x proximity;
  }
  .rail::-webkit-scrollbar{display:none}
  .tama{
    flex:0 0 auto;scroll-snap-align:center;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-family:inherit;cursor:pointer;
    background:var(--glass);border:1px solid var(--line);border-radius:14px;
    padding:10px 15px 9px;min-width:86px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:var(--ink);transition:border-color .2s,box-shadow .2s,transform .15s;
  }
  .tama:active{transform:scale(.95)}
  .tama .nm{font-family:"Shippori Mincho",serif;font-size:14.5px;letter-spacing:.14em;font-weight:600}
  .tama .yomi{font-size:9.5px;letter-spacing:.1em;color:var(--ink-dim)}
  .tama .dot{width:6px;height:6px;border-radius:50%;margin-bottom:2px;background:var(--c,#fff);box-shadow:0 0 8px var(--c,#fff)}
  .tama.sel{
    border-color:rgba(255,180,92,.6);
    box-shadow:0 0 0 1px rgba(255,180,92,.35) inset,0 0 18px rgba(255,180,92,.18);
  }
  .tama.sel .yomi{color:var(--lantern)}
  .tama:focus-visible{outline:2px solid var(--lantern);outline-offset:2px}

  @media (prefers-reduced-motion:reduce){
    #hint .ring{animation:none;opacity:.5}
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="re"></canvas>
<canvas id="fx"></canvas>

<header>
  <div class="title">
    <h1>湖上花火大会</h1>
    <p>REALISTIC HANABI SIMULATOR</p>
  </div>
  <div class="switches">
    <button class="sw" id="swAuto" aria-pressed="false">自動打上 OFF</button>
    <button class="sw" id="swSnd" aria-pressed="false">音 OFF</button>
  </div>
</header>

<div id="hint">
  <div class="ring"></div>
  <p>空 に ふ れ て 打 ち 上 げ</p>
</div>

<div id="tamana" aria-live="polite"></div>

<nav aria-label="花火の種類">
  <div class="rail" id="rail"></div>
</nav>

<script>
"use strict";
/* ============================================================
   湖上花火大会 — リアル花火シミュレーター
   2キャンバス構成: bg(夜景) / fx(花火) + re(湖面反射)
============================================================ */
const DPR = Math.min(window.devicePixelRatio || 1, 2);
const bgC = document.getElementById("bg"), bgX = bgC.getContext("2d");
const fxC = document.getElementById("fx"), fxX = fxC.getContext("2d");
const reC = document.getElementById("re"), reX = reC.getContext("2d");
let W = 0, H = 0, WATER = 0;   // WATER = 水面のy座標
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

function resize(){
  W = innerWidth; H = innerHeight; WATER = H * 0.82;
  for (const c of [bgC, fxC, reC]){
    c.width = W * DPR; c.height = H * DPR;
    c.getContext("2d").setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  paintBackground();
}
addEventListener("resize", resize);

/* ---------- 夜景(静止画レイヤー) ---------- */
function paintBackground(){
  // 夜空グラデーション
  const sky = bgX.createLinearGradient(0, 0, 0, WATER);
  sky.addColorStop(0, "#02030a");
  sky.addColorStop(0.55, "#060a1c");
  sky.addColorStop(1, "#0d1330");
  bgX.fillStyle = sky;
  bgX.fillRect(0, 0, W, WATER);

  // 星
  for (let i = 0; i < 130; i++){
    const x = Math.random() * W, y = Math.random() * WATER * 0.85;
    const r = Math.random() * 0.9 + 0.2;
    bgX.fillStyle = `rgba(220,228,255,${Math.random() * 0.55 + 0.1})`;
    bgX.beginPath(); bgX.arc(x, y, r, 0, 7); bgX.fill();
  }

  // 遠くの山並み(2層)
  mountain(WATER - H * 0.10, "#050814", 0.05);
  mountain(WATER - H * 0.045, "#03050d", 0.035);

  // 湖面
  const lake = bgX.createLinearGradient(0, WATER, 0, H);
  lake.addColorStop(0, "#0a0f24");
  lake.addColorStop(1, "#01020a");
  bgX.fillStyle = lake;
  bgX.fillRect(0, WATER, W, H - WATER);

  // 対岸の街灯り
  for (let i = 0; i < 26; i++){
    const x = Math.random() * W;
    const warm = Math.random() < 0.7;
    bgX.fillStyle = warm ? "rgba(255,190,110,.8)" : "rgba(160,200,255,.7)";
    bgX.fillRect(x, WATER - 2 - Math.random() * 3, 1.6, 1.6);
    // 灯りの湖面反射
    bgX.fillStyle = warm ? "rgba(255,190,110,.12)" : "rgba(160,200,255,.1)";
    bgX.fillRect(x - 0.5, WATER + 2, 2.4, 14 + Math.random() * 22);
  }
}
function mountain(baseY, color, amp){
  bgX.fillStyle = color;
  bgX.beginPath();
  bgX.moveTo(0, baseY);
  let y = baseY;
  for (let x = 0; x <= W; x += 24){
    y += (Math.random() - 0.5) * H * amp;
    y = Math.min(baseY + H * 0.02, Math.max(baseY - H * 0.09, y));
    bgX.lineTo(x, y);
  }
  bgX.lineTo(W, WATER); bgX.lineTo(0, WATER);
  bgX.closePath(); bgX.fill();
}

/* ---------- サウンド(WebAudio合成) ---------- */
let audio = null, soundOn = false;
function initAudio(){
  if (audio) return;
  audio = new (window.AudioContext || window.webkitAudioContext)();
}
function boom(size = 1, delay = 0){
  if (!soundOn || !audio) return;
  const t = audio.currentTime + delay;
  // ドンという低音
  const osc = audio.createOscillator(), og = audio.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(120 * size, t);
  osc.frequency.exponentialRampToValueAtTime(32, t + 0.5);
  og.gain.setValueAtTime(0.55 * size, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  osc.connect(og).connect(audio.destination);
  osc.start(t); osc.stop(t + 1);
  // パラパラという破裂ノイズ
  const len = audio.sampleRate * 1.3;
  const buf = audio.createBuffer(1, len, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
  const src = audio.createBufferSource(); src.buffer = buf;
  const f = audio.createBiquadFilter();
  f.type = "lowpass"; f.frequency.setValueAtTime(2600, t);
  f.frequency.exponentialRampToValueAtTime(300, t + 1.1);
  const ng = audio.createGain(); ng.gain.value = 0.4 * size;
  src.connect(f).connect(ng).connect(audio.destination);
  src.start(t);
}
function launchHiss(){
  if (!soundOn || !audio) return;
  const t = audio.currentTime;
  const len = audio.sampleRate * 0.7;
  const buf = audio.createBuffer(1, len, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len) * 0.3;
  const src = audio.createBufferSource(); src.buffer = buf;
  const f = audio.createBiquadFilter(); f.type = "highpass"; f.frequency.value = 1800;
  const g = audio.createGain(); g.gain.value = 0.08;
  src.connect(f).connect(g).connect(audio.destination);
  src.start(t);
}

/* ---------- 花火の種類定義 ---------- */
const TYPES = {
  kiku: {
    nm:"菊", yomi:"きく", dot:"#ffd27a",
    count:150, speed:[2.2, 8.4], gravity:0.028, friction:0.986,
    decay:[0.006, 0.010], hueMode:"gold", trail:true, flicker:true, size:1.9,
  },
  botan: {
    nm:"牡丹", yomi:"ぼたん", dot:"#ff6ea8",
    count:130, speed:[2.4, 9.0], gravity:0.03, friction:0.982,
    decay:[0.010, 0.016], hueMode:"vivid", trail:false, flicker:false, size:2.3,
  },
  yanagi: {
    nm:"枝垂柳", yomi:"しだれやなぎ", dot:"#ffe9b0",
    count:95, speed:[1.6, 6.2], gravity:0.016, friction:0.993,
    decay:[0.0028, 0.0045], hueMode:"amber", trail:true, flicker:true, size:1.6,
  },
  kamuro: {
    nm:"冠菊", yomi:"かむろ", dot:"#ffc44d",
    count:190, speed:[2.0, 7.6], gravity:0.024, friction:0.99,
    decay:[0.004, 0.006], hueMode:"gold", trail:true, flicker:true, size:1.7,
  },
  senrin: {
    nm:"千輪", yomi:"せんりん", dot:"#8fd0ff",
    sub:true,
  },
  heart: {
    nm:"型物", yomi:"ハート", dot:"#ff5d7e",
    shape:true,
  },
  starmine: {
    nm:"大スターマイン", yomi:"だいすたーまいん", dot:"#c7a6ff",
    mine:true,
  },
};
let selected = "starmine";

/* ---------- パーティクル ---------- */
const shells = [], sparks = [], subs = [], glows = [];
const MAX_SPARKS = 2600;

function rnd(a, b){ return a + Math.random() * (b - a); }

function hueFor(mode){
  switch (mode){
    case "gold":  return rnd(38, 50);
    case "amber": return rnd(34, 44);
    case "vivid": {
      const base = [350, 320, 275, 210, 185, 130, 55, 18];
      return base[(Math.random() * base.length) | 0] + rnd(-8, 8);
    }
    default: return rnd(0, 360);
  }
}

class Shell {
  constructor(tx, ty, type){
    this.type = type;
    this.x = tx + rnd(-30, 30);
    this.y = WATER;
    this.tx = tx; this.ty = ty;
    const t = 60 + rnd(-6, 6);                 // 到達フレーム数の目安
    this.vy = -(WATER - ty) / t - 0.5 * 0.052 * t;
    this.vx = (tx - this.x) / t;
    this.hue = rnd(30, 50);
    launchHiss();
  }
  step(){
    this.vy += 0.052;
    this.x += this.vx; this.y += this.vy;
    // 上昇の尾
    if (Math.random() < 0.85) sparks.push(new Spark(
      this.x + rnd(-1,1), this.y, rnd(-0.3,0.3), rnd(0.4,1.2),
      { hue:this.hue, sat:60, decay:rnd(0.05,0.1), size:1.2,
        gravity:0.02, friction:0.96, trail:false, flicker:false }
    ));
    if (this.vy >= -0.8 || this.y <= this.ty){
      explode(this.x, this.y, this.type);
      return false;
    }
    return true;
  }
  draw(){
    fxX.fillStyle = `hsla(${this.hue},70%,80%,.9)`;
    fxX.beginPath(); fxX.arc(this.x, this.y, 1.6, 0, 7); fxX.fill();
  }
}

class Spark {
  constructor(x, y, vx, vy, o){
    this.x = x; this.y = y; this.px = x; this.py = y;
    this.vx = vx; this.vy = vy;
    this.hue = o.hue; this.sat = o.sat ?? 100;
    this.life = 1; this.decay = o.decay;
    this.size = o.size; this.gravity = o.gravity;
    this.friction = o.friction; this.trail = o.trail;
    this.flicker = o.flicker;
  }
  step(){
    this.px = this.x; this.py = this.y;
    this.vx *= this.friction; this.vy *= this.friction;
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
    if (this.y > WATER + 4) this.life -= 0.08;   // 着水で消える
    return this.life > 0;
  }
  draw(){
    let a = Math.max(this.life, 0);
    if (this.flicker && this.life < 0.75) a *= rnd(0.25, 1);
    const light = 50 + 30 * this.life;
    fxX.strokeStyle = `hsla(${this.hue},${this.sat}%,${light}%,${a})`;
    fxX.lineWidth = this.size * (0.5 + this.life * 0.7);
    fxX.beginPath();
    fxX.moveTo(this.px, this.py);
    fxX.lineTo(this.x, this.y);
    fxX.stroke();
  }
}

/* 千輪用の小玉 */
class SubShell {
  constructor(x, y, vx, vy, timer){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.t=timer;
    this.hue = hueFor("vivid");
  }
  step(){
    this.vx *= 0.985; this.vy = this.vy * 0.985 + 0.03;
    this.x += this.vx; this.y += this.vy;
    if (--this.t <= 0){
      burst(this.x, this.y, {
        count:34, speed:[0.8, 3.4], gravity:0.026, friction:0.985,
        decay:[0.012, 0.02], hueMode:null, hue:this.hue,
        trail:false, flicker:false, size:1.8,
      });
      boom(0.35);
      return false;
    }
    return true;
  }
  draw(){
    fxX.fillStyle = `hsla(${this.hue},80%,75%,.9)`;
    fxX.beginPath(); fxX.arc(this.x, this.y, 1.4, 0, 7); fxX.fill();
  }
}

/* 開花の閃光 */
class Glow {
  constructor(x, y, r, hue){ this.x=x; this.y=y; this.r=r; this.hue=hue; this.life=1; }
  step(){ this.life -= 0.08; return this.life > 0; }
  draw(){
    const g = fxX.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*(1.6-this.life*0.6));
    g.addColorStop(0, `hsla(${this.hue},70%,85%,${0.5*this.life})`);
    g.addColorStop(1, "hsla(0,0%,0%,0)");
    fxX.fillStyle = g;
    fxX.beginPath(); fxX.arc(this.x,this.y,this.r*1.6,0,7); fxX.fill();
  }
}

/* ---------- 爆発ロジック ---------- */
function burst(x, y, cfg){
  const budget = Math.max(0, MAX_SPARKS - sparks.length);
  const n = Math.min(cfg.count, budget);
  const baseHue = cfg.hue ?? hueFor(cfg.hueMode);
  for (let i = 0; i < n; i++){
    // 3D球面分布 → 2D投影で立体感を出す
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(rnd(-1, 1));
    const sp = rnd(cfg.speed[0], cfg.speed[1]);
    const vx = sp * Math.sin(ph) * Math.cos(th);
    const vy = sp * Math.sin(ph) * Math.sin(th);
    const hue = cfg.hueMode ? (cfg.hueMode === "vivid" ? baseHue + rnd(-6,6) : hueFor(cfg.hueMode)) : baseHue + rnd(-6,6);
    sparks.push(new Spark(x, y, vx, vy, {
      hue, decay: rnd(cfg.decay[0], cfg.decay[1]),
      size: cfg.size, gravity: cfg.gravity, friction: cfg.friction,
      trail: cfg.trail, flicker: cfg.flicker,
    }));
  }
}

function explode(x, y, key){
  const t = TYPES[key];
  showName(t);
  if (t.sub){            // 千輪:小玉に分裂して時間差で開花
    glows.push(new Glow(x, y, 40, 45));
    boom(0.5);
    for (let i = 0; i < 11; i++){
      const a = Math.random() * Math.PI * 2;
      const sp = rnd(1.4, 3.6);
      subs.push(new SubShell(x, y, Math.cos(a)*sp, Math.sin(a)*sp*0.8, 26 + rnd(0, 22)));
    }
    return;
  }
  if (t.shape){          // 型物(ハート)
    glows.push(new Glow(x, y, 60, 345));
    boom(0.8);
    const hue = 345 + rnd(-8, 8);
    for (let i = 0; i < 110; i++){
      const a = (i / 110) * Math.PI * 2;
      let hx = 16 * Math.pow(Math.sin(a), 3);
      let hy = -(13*Math.cos(a) - 5*Math.cos(2*a) - 2*Math.cos(3*a) - Math.cos(4*a));
      const sp = 0.36 * rnd(0.95, 1.05);
      sparks.push(new Spark(x, y, hx*sp, hy*sp, {
        hue, decay: rnd(0.008, 0.012), size: 2.1,
        gravity: 0.012, friction: 0.985, trail:false, flicker:false,
      }));
    }
    return;
  }
  glows.push(new Glow(x, y, 40 + t.count * 0.35, t.hueMode === "vivid" ? hueFor("vivid") : 45));
  boom(Math.min(1.2, t.count / 150));
  burst(x, y, t);
  // 菊・冠菊には芯(内側の色替え)を入れる
  if (key === "kiku" || key === "kamuro"){
    burst(x, y, {
      count: 40, speed:[0.6, 3.0], gravity:0.024, friction:0.985,
      decay:[0.012, 0.018], hueMode:"vivid",
      trail:false, flicker:false, size:2.0,
    });
  }
}

/* ---------- 大スターマイン ---------- */
const queue = [];   // {frame, x, y, type}
let frame = 0;
function starmine(cx){
  const base = frame;
  const keys = ["botan", "kiku", "botan", "kamuro", "botan", "kiku"];
  let f = 0;
  // 序:速射
  for (let i = 0; i < 14; i++){
    queue.push({ frame: base + f, x: cx + rnd(-W*0.3, W*0.3), y: rnd(H*0.24, H*0.5), type: keys[(Math.random()*keys.length)|0] });
    f += 7 + rnd(0, 7);
  }
  // 破:柳と千輪を混ぜる
  for (let i = 0; i < 6; i++){
    queue.push({ frame: base + f, x: cx + rnd(-W*0.35, W*0.35), y: rnd(H*0.2, H*0.42), type: Math.random()<0.5 ? "yanagi" : "senrin" });
    f += 16 + rnd(0, 10);
  }
  // 急:同時多発のフィナーレ
  for (let i = 0; i < 10; i++){
    queue.push({ frame: base + f + rnd(0, 8), x: cx + rnd(-W*0.4, W*0.4), y: rnd(H*0.18, H*0.4), type: keys[(Math.random()*keys.length)|0] });
  }
  queue.push({ frame: base + f + 26, x: cx, y: H*0.22, type: "kamuro" });
}

/* ---------- 打ち上げ ---------- */
function launch(x, y){
  x = Math.min(Math.max(x, W*0.08), W*0.92);
  y = Math.min(Math.max(y, H*0.12), H*0.55);
  if (selected === "starmine"){ starmine(x); return; }
  shells.push(new Shell(x, y, selected));
}

/* ---------- メインループ ---------- */
let autoOn = false, autoTimer = 0;
function loop(){
  requestAnimationFrame(loop);
  frame++;

  // 残像フェード(destination-outで透明化して夜景を透かす)
  fxX.globalCompositeOperation = "destination-out";
  fxX.fillStyle = "rgba(0,0,0,0.16)";
  fxX.fillRect(0, 0, W, H);
  fxX.globalCompositeOperation = "lighter";

  // キュー消化(スターマイン)
  for (let i = queue.length - 1; i >= 0; i--){
    if (queue[i].frame <= frame){
      const q = queue.splice(i, 1)[0];
      shells.push(new Shell(q.x, q.y, q.type));
    }
  }

  for (let i = shells.length - 1; i >= 0; i--){
    if (!shells[i].step()) shells.splice(i, 1); else shells[i].draw();
  }
  for (let i = subs.length - 1; i >= 0; i--){
    if (!subs[i].step()) subs.splice(i, 1); else subs[i].draw();
  }
  for (let i = glows.length - 1; i >= 0; i--){
    if (!glows[i].step()) glows.splice(i, 1); else glows[i].draw();
  }
  for (let i = sparks.length - 1; i >= 0; i--){
    if (!sparks[i].step()) sparks.splice(i, 1); else sparks[i].draw();
  }

  // 湖面反射(fxキャンバスを上下反転・減光して水面に描画)
  reX.clearRect(0, WATER, W, H - WATER);
  reX.save();
  reX.globalAlpha = 0.26;
  reX.translate(0, WATER * 2);
  reX.scale(1, -1);
  reX.drawImage(fxC, 0, 0, W * DPR, WATER * DPR, 0, WATER * 0.35, W, WATER * 0.65);
  reX.restore();

  // 自動打上
  if (autoOn && --autoTimer <= 0){
    const keys = ["kiku","botan","yanagi","kamuro","senrin","heart"];
    const pick = Math.random() < 0.12 ? "starmine" : keys[(Math.random()*keys.length)|0];
    const prev = selected; selected = pick;
    launch(rnd(W*0.2, W*0.8), rnd(H*0.18, H*0.45));
    selected = prev;
    autoTimer = pick === "starmine" ? 460 : (reduceMotion ? 210 : 90 + rnd(0, 80));
  }
}

/* ---------- UI ---------- */
const rail = document.getElementById("rail");
const nameEl = document.getElementById("tamana");
const hint = document.getElementById("hint");
let nameTimer = null, hintShown = true;

const ORDER = ["starmine","kiku","botan","yanagi","kamuro","senrin","heart"];
for (const key of ORDER){
  const t = TYPES[key];
  const b = document.createElement("button");
  b.className = "tama" + (key === selected ? " sel" : "");
  b.style.setProperty("--c", t.dot);
  b.innerHTML = `<span class="dot"></span><span class="nm">${t.nm}</span><span class="yomi">${t.yomi}</span>`;
  b.addEventListener("click", () => {
    selected = key;
    document.querySelectorAll(".tama").forEach(el => el.classList.remove("sel"));
    b.classList.add("sel");
    launch(W * 0.5, H * 0.3);   // 選んだ瞬間に一発お手本
    hideHint();
  });
  rail.appendChild(b);
}

function showName(t){
  nameEl.textContent = t.nm === "型物" ? "型物・ハート" : t.nm;
  nameEl.classList.add("show");
  clearTimeout(nameTimer);
  nameTimer = setTimeout(() => nameEl.classList.remove("show"), 1600);
}
function hideHint(){
  if (!hintShown) return;
  hintShown = false;
  hint.classList.add("hide");
}

fxC.addEventListener("pointerdown", e => {
  initAudio();
  if (audio && audio.state === "suspended") audio.resume();
  launch(e.clientX, e.clientY);
  hideHint();
});

document.getElementById("swAuto").addEventListener("click", function(){
  autoOn = !autoOn; autoTimer = 0;
  this.classList.toggle("on", autoOn);
  this.textContent = "自動打上 " + (autoOn ? "ON" : "OFF");
  this.setAttribute("aria-pressed", autoOn);
  hideHint();
});
document.getElementById("swSnd").addEventListener("click", function(){
  initAudio();
  if (audio && audio.state === "suspended") audio.resume();
  soundOn = !soundOn;
  this.classList.toggle("on", soundOn);
  this.textContent = "音 " + (soundOn ? "ON" : "OFF");
  this.setAttribute("aria-pressed", soundOn);
});

/* ---------- 起動 ---------- */
resize();
loop();
// オープニングに一発
setTimeout(() => { const p = selected; selected = "kiku"; launch(W*0.5, H*0.28); selected = p; }, 700);
</script>
</body>
